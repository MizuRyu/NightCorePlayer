name: Deploy Legal Pages

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/pages.yml"
      - "privacy-policy/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Pages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install MkDocs
        run: pip install mkdocs

      - name: Build site
        run: mkdocs build --config-file privacy-policy/mkdocs.yml

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: privacy-policy/site

  deploy:
    name: Deploy GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
